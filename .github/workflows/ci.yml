name: build-test-pack-publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_test_pack:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/ReactiveUIMcpServer.slnx

      - name: Build
        run: dotnet build src/ReactiveUIMcpServer.slnx -c Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test --project src/ReactiveUIMcp.Tests/ReactiveUIMcp.Tests.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack src/ReactiveUIMcp.Server/ReactiveUIMcp.Server.csproj -c Release --no-build -o artifacts /p:ContinuousIntegrationBuild=true

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

  publish_nuget:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build_test_pack
    runs-on: windows-latest

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
